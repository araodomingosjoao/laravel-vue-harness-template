name: Claude agent

# Implementação conduzida pelo agente. Menciona @claude num issue ou comentário
# de PR (ex.: "@claude adiciona um endpoint GET /api/ping") e o agente implementa
# numa branch e abre/atualiza o PR. Os gates + ai-review + security-review
# (agent-pr.yml) validam-no depois. Corre na subscrição (CLAUDE_CODE_OAUTH_TOKEN).
#
# Pedido vago ou de escopo grande? O agente usa primeiro o sub-agente spec-writer:
# publica uma spec e, se ficarem perguntas em aberto que não resolve pelo CLAUDE.md/
# ADRs/código, pára sem implementar até o humano responder (ver claude_args abaixo).
#
# NOTA: para o PR do agente disparar automaticamente o agent-pr.yml, é preciso o
# Claude GitHub App instalado (um PR aberto pelo GITHUB_TOKEN não dispara outros
# workflows). Vê o README §5.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude:
    # Só corre quando @claude é mencionado
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Ambiente de dev para o agente se AUTO-VALIDAR (composer/pnpm gates) antes
      # de abrir/atualizar o PR. Sem isto, o agente não tem vendor/node_modules,
      # não consegue correr os gates, e implementa às cegas → loop de correções.
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: composer install --no-interaction --no-progress
      - run: pnpm install --frozen-lockfile

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: '--append-system-prompt "For non-trivial tasks, follow the agent pipeline in CLAUDE.md: spec-writer for vague or large requests, then tech-planner, then the implementer (laravel-backend / vue-frontend), then code-reviewer, then adr-author. Subagents cannot call other subagents, so you orchestrate the chain. If the request is vague or large and open questions remain that you cannot resolve from CLAUDE.md, the ADRs or the existing code, post the spec with an Open questions section and STOP without implementing until a human answers. Never invent decisions. Clear, small tasks skip the planner and ADR: implement directly with the spec summary in the PR description. Before finishing, run composer gates and pnpm gates and fix every failure so the PR checks are green. Keep changes minimal and within CLAUDE.md conventions. Write everything you post on the PR or issue for a human to read (the PR description, the spec, and any open questions) in Portuguese (pt-PT); keep code, commit messages and CI output in English."'
