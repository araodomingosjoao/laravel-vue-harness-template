name: Claude agent

# Implementação conduzida pelo agente. Menciona @claude num issue ou comentário
# de PR (ex.: "@claude adiciona um endpoint GET /api/ping") e o agente implementa
# numa branch e abre/atualiza o PR. Os gates + ai-review + security-review
# (agent-pr.yml) validam-no depois. Corre na subscrição (CLAUDE_CODE_OAUTH_TOKEN).
#
# NOTA: para o PR do agente disparar automaticamente o agent-pr.yml, é preciso o
# Claude GitHub App instalado (um PR aberto pelo GITHUB_TOKEN não dispara outros
# workflows). Vê o README §5.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude:
    # Só corre quando @claude é mencionado
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
