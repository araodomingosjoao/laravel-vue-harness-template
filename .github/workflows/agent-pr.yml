name: Agent PR Quality Gates v2

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'    # segundas às 6h UTC: eval set
  workflow_dispatch:        # manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # PRE-FLIGHT: kill switch, rate limit, classificação de risco
  # ─────────────────────────────────────────────────────────────
  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      risk_level: ${{ steps.classify.outputs.risk_level }}
      requires_human: ${{ steps.classify.outputs.requires_human }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - name: Kill switch check
        run: python scripts/budget_check.py

      - name: Rate limit check
        run: python scripts/budget_check.py --check-pr-rate
        if: github.event_name == 'pull_request'

      - name: Classify risk
        id: classify
        run: |
          # base_ref só existe em PRs; noutros eventos comparamos com HEAD~1
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          RISK=$(python scripts/classify_risk.py "$BASE")
          echo "risk_level=$RISK" >> "$GITHUB_OUTPUT"
          if [ "$RISK" = "critical" ] || [ "$RISK" = "high" ]; then
            echo "requires_human=true" >> "$GITHUB_OUTPUT"
          else
            echo "requires_human=false" >> "$GITHUB_OUTPUT"
          fi
          echo "## Risk classification: \`$RISK\`" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────
  # SUPPLY CHAIN: dependências e segredos
  # ─────────────────────────────────────────────────────────────
  supply-chain:
    name: Supply chain & secrets
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          # sem cache pnpm: este job só faz audit, não install

      - name: Verify dependencies against allow-list
        run: python scripts/check_dependencies.py

      - name: composer audit
        run: composer audit --abandoned=report

      - name: pnpm audit
        run: pnpm audit --prod --audit-level high

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # BACKEND
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Laravel
    runs-on: ubuntu-latest
    needs: preflight

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U todo" --health-interval=10s
          --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_pgsql, bcmath, intl
          coverage: xdebug
          tools: composer:v2

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - run: composer install --prefer-dist --no-progress --no-interaction
      - run: cp .env.example .env.testing
      - run: php artisan key:generate --env=testing
      - name: Migrate
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: todo_test
          DB_USERNAME: todo
          DB_PASSWORD: secret
        run: php artisan migrate --env=testing --force

      - run: ./vendor/bin/pint --test
      - run: ./vendor/bin/phpstan analyse --memory-limit=2G --no-progress
      - name: Pest
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: todo_test
          DB_USERNAME: todo
          DB_PASSWORD: secret
        # cobertura é opt-in (composer test:coverage); 80% num esqueleto é impossível
        run: ./vendor/bin/pest --parallel

  # ─────────────────────────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Vue + TS
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test -- --coverage
      - run: pnpm run build

  # ─────────────────────────────────────────────────────────────
  # AI CODE REVIEW (Claude Code Action — rubrica = CLAUDE.md)
  # ─────────────────────────────────────────────────────────────
  code-review:
    name: AI code review
    runs-on: ubuntu-latest
    needs: preflight
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Health check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY não configurado — sensor inferencial está OFFLINE"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Revê este pull request como reviewer sénior, aplicando as convenções
            do CLAUDE.md deste repositório (as "Regras de ouro" de backend e
            frontend são a tua rubrica). Foca-te em:
            - Aderência ao CLAUDE.md: Form Requests, Resources, $fillable,
              paginação, controllers magros, Policies; no frontend script setup,
              Pinia setup syntax, sem `any`, fetch via composable.
            - Bugs e edge cases.
            - Implicações de segurança.
            - Performance (ex.: N+1 queries).

            A branch do PR já está em checkout no working directory.
            Usa `gh pr comment` para feedback de topo e
            `mcp__github_inline_comment__create_inline_comment` (com
            `confirmed: true`) para problemas em linhas específicas.
            Comenta apenas no GitHub — não devolvas o review como mensagem.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  # ─────────────────────────────────────────────────────────────
  # AI SECURITY REVIEW (Claude Code Security Review — advisory)
  # ─────────────────────────────────────────────────────────────
  security-review:
    name: AI security review
    runs-on: ubuntu-latest
    needs: preflight
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: anthropics/claude-code-security-review@main
        with:
          comment-pr: true
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

  # ─────────────────────────────────────────────────────────────
  # E2E (só se tudo anterior passar)
  # ─────────────────────────────────────────────────────────────
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: needs.preflight.outputs.risk_level != 'low'

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: composer install --no-interaction
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Start servers
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: todo_test
          DB_USERNAME: todo
          DB_PASSWORD: secret
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --seed --force
          php artisan serve --host=0.0.0.0 --port=8000 &
          pnpm run dev &
          sleep 5
      - run: pnpm exec playwright test

  # ─────────────────────────────────────────────────────────────
  # EVAL SET (semanal)
  # ─────────────────────────────────────────────────────────────
  eval-set:
    name: Eval set (regression)
    runs-on: ubuntu-latest
    if: github.event.schedule || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml anthropic
      - run: composer install && pnpm install --frozen-lockfile
      - name: Run eval set
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/eval.py run --all
      - name: Compare with baseline
        run: |
          BASELINE=$(ls -t tests/harness/eval-set/results/*.json | head -2 | tail -1)
          CURRENT=$(ls -t tests/harness/eval-set/results/*.json | head -1)
          python scripts/eval.py compare --baseline "$BASELINE" --current "$CURRENT"
      - uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: tests/harness/eval-set/results/

  # ─────────────────────────────────────────────────────────────
  # MERGE GATE: bloqueia merge se requires_human
  # ─────────────────────────────────────────────────────────────
  merge-gate:
    name: Merge gate
    runs-on: ubuntu-latest
    needs: [preflight, supply-chain, backend, frontend, code-review, security-review]
    if: github.event_name == 'pull_request'
    steps:
      - name: Check approvals
        run: |
          if [ "${{ needs.preflight.outputs.requires_human }}" = "true" ]; then
            echo "::warning::PR de risco ${{ needs.preflight.outputs.risk_level }} — requer aprovação humana sénior"
            # Lógica real verificaria via GitHub API se há approving review
          fi
          echo "## ✓ Todos os gates passaram" >> $GITHUB_STEP_SUMMARY
          echo "Risk level: ${{ needs.preflight.outputs.risk_level }}" >> $GITHUB_STEP_SUMMARY
