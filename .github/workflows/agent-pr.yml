name: Agent PR Quality Gates v2

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'    # segundas às 6h UTC: eval set
  workflow_dispatch:        # manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # PRE-FLIGHT: kill switch, rate limit, classificação de risco
  # ─────────────────────────────────────────────────────────────
  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      risk_level: ${{ steps.classify.outputs.risk_level }}
      requires_human: ${{ steps.classify.outputs.requires_human }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - name: Kill switch check
        run: python scripts/budget_check.py

      - name: Rate limit check
        run: python scripts/budget_check.py --check-pr-rate
        if: github.event_name == 'pull_request'

      - name: Classify risk
        id: classify
        run: |
          # base_ref só existe em PRs; noutros eventos comparamos com HEAD~1
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          RISK=$(python scripts/classify_risk.py "$BASE")
          echo "risk_level=$RISK" >> "$GITHUB_OUTPUT"
          if [ "$RISK" = "critical" ] || [ "$RISK" = "high" ]; then
            echo "requires_human=true" >> "$GITHUB_OUTPUT"
          else
            echo "requires_human=false" >> "$GITHUB_OUTPUT"
          fi
          echo "## Risk classification: \`$RISK\`" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────
  # SUPPLY CHAIN: dependências e segredos
  # ─────────────────────────────────────────────────────────────
  supply-chain:
    name: Supply chain & secrets
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          # sem cache pnpm: este job só faz audit, não install

      - name: Verify dependencies against allow-list
        run: python scripts/check_dependencies.py

      - name: composer audit
        run: composer audit --abandoned=report

      - name: pnpm audit
        run: pnpm audit --prod --audit-level high

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # BACKEND
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Laravel
    runs-on: ubuntu-latest
    needs: preflight

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U todo" --health-interval=10s
          --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_pgsql, bcmath, intl
          coverage: xdebug
          tools: composer:v2

      - uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - run: composer install --prefer-dist --no-progress --no-interaction
      - run: cp .env.example .env.testing
      - run: php artisan key:generate --env=testing
      - name: Migrate
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: todo_test
          DB_USERNAME: todo
          DB_PASSWORD: secret
        run: php artisan migrate --env=testing --force

      - run: ./vendor/bin/pint --test
      - run: ./vendor/bin/phpstan analyse --memory-limit=2G --no-progress
      - name: Pest
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: todo_test
          DB_USERNAME: todo
          DB_PASSWORD: secret
        # cobertura é opt-in (composer test:coverage); 80% num esqueleto é impossível
        run: ./vendor/bin/pest --parallel

  # ─────────────────────────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Vue + TS
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test -- --coverage
      - run: pnpm run build

  # ─────────────────────────────────────────────────────────────
  # HARNESS SELF-TEST: o harness valida os próprios scripts (ruff + mypy + pytest)
  # ─────────────────────────────────────────────────────────────
  harness:
    name: Harness self-test
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - run: ruff check scripts/ tests/harness/
      - run: mypy scripts/
      - run: pytest tests/harness -q

  # ─────────────────────────────────────────────────────────────
  # AI REVIEW (Claude Code Action — qualidade + segurança; rubrica = CLAUDE.md)
  # ─────────────────────────────────────────────────────────────
  ai-review:
    name: AI review
    runs-on: ubuntu-latest
    needs: preflight
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      # Usa só a subscrição Pro/Max (CLAUDE_CODE_OAUTH_TOKEN, via `claude setup-token`).
      # NÃO recebe a API key de propósito: quando ambas existem a API tem precedência
      # e seria cobrada — assim o budget de API fica reservado para os jobs opt-in.
      # (Sem subscrição? Troca claude_code_oauth_token por anthropic_api_key abaixo.)
      - name: Check credentials
        id: creds
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$OAUTH_TOKEN" ]; then
            echo "::notice::No CLAUDE_CODE_OAUTH_TOKEN configured — skipping AI review"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.enabled == 'true'
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        if: steps.creds.outputs.enabled == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Rever PRs/commits do bot do agente — senão a action bloqueia runs
          # iniciados por bots. Podes restringir a bots específicos (ex.: "claude").
          allowed_bots: "*"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request as a senior reviewer. Cover TWO dimensions:

            1) Quality and conventions — apply the "Regras de ouro" from CLAUDE.md:
               Form Requests, Resources, $fillable, pagination, thin controllers,
               Policies; on the frontend script setup, Pinia setup syntax, no `any`,
               fetch via composable. Also bugs, edge cases and performance (e.g. N+1).

            2) Security — analyse the diff following data flow across files:
               missing authorization/access control, injection (SQL/command),
               insecure deserialization, SSRF, path traversal, XSS, hardcoded
               secrets, exposed APP_DEBUG/credentials, mass-assignment without
               $fillable, missing validation. Report real issues only.

            The PR branch is already checked out. Use `gh pr comment` for the summary
            and `mcp__github_inline_comment__create_inline_comment` (with
            `confirmed: true`) for line-specific issues. Comment only on GitHub.

            Write the summary and all review comments in Portuguese (pt-PT). Keep
            code identifiers, file paths and commands as-is.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  # ─────────────────────────────────────────────────────────────
  # AI SECURITY REVIEW (Claude Code Security Review — opcional, usa API)
  # Liga com a repo Variable HARNESS_SECURITY_REVIEW=true + secret ANTHROPIC_API_KEY.
  # Não está no merge-gate (não bloqueia): salta quando desligado.
  # ─────────────────────────────────────────────────────────────
  security-review:
    name: AI security review
    runs-on: ubuntu-latest
    needs: preflight
    if: github.event_name == 'pull_request' && vars.HARNESS_SECURITY_REVIEW == 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check API key
        id: creds
        env:
          API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::notice::HARNESS_SECURITY_REVIEW=true but no ANTHROPIC_API_KEY — skipping security review"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.enabled == 'true'
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: anthropics/claude-code-security-review@main
        if: steps.creds.outputs.enabled == 'true'
        with:
          comment-pr: true
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

  # ─────────────────────────────────────────────────────────────
  # E2E (só se tudo anterior passar)
  # ─────────────────────────────────────────────────────────────
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: needs.preflight.outputs.risk_level != 'low'

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: composer install --no-interaction
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      # Arranque do servidor e os testes vivem no MESMO step: processos em
      # background não sobrevivem ao fim de um step no GitHub Actions.
      - name: Run e2e
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: todo_test
          DB_USERNAME: todo
          DB_PASSWORD: secret
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --seed --force
          php artisan serve --host=127.0.0.1 --port=8000 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8000/up >/dev/null && break; sleep 1; done
          pnpm exec playwright test

  # ─────────────────────────────────────────────────────────────
  # EVAL SET (semanal — opcional, usa a subscrição)
  # Liga com a repo Variable HARNESS_EVAL_SET=true + secret CLAUDE_CODE_OAUTH_TOKEN.
  # Corre o agente (claude CLI headless) por task num sandbox, na subscrição (não API).
  # Localmente nem precisas de token: o `claude` usa a tua sessão logada.
  # Teto de custo: budgets.max_cost_usd (por task) + HARNESS_EVAL_MAX_COST_USD (run).
  # ─────────────────────────────────────────────────────────────
  eval-set:
    name: Eval set (regression)
    runs-on: ubuntu-latest
    if: (github.event.schedule || github.event_name == 'workflow_dispatch') && vars.HARNESS_EVAL_SET == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - run: npm install -g @anthropic-ai/claude-code
      - run: composer install && pnpm install --frozen-lockfile
      - name: Run eval set + check regression vs committed baseline
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          HARNESS_EVAL_MAX_COST_USD: ${{ vars.HARNESS_EVAL_MAX_COST_USD || '5' }}
        # --check-regression compara com tests/harness/eval-set/baseline.json (commitado).
        # Sem baseline ainda, não falha (bootstrap). Atualizar a barra é deliberado:
        # localmente `eval.py run --all --update-baseline` + commit do baseline.json.
        run: python scripts/eval.py run --all --check-regression
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: tests/harness/eval-set/results/

  # ─────────────────────────────────────────────────────────────
  # MERGE GATE: bloqueia merge se requires_human
  # ─────────────────────────────────────────────────────────────
  merge-gate:
    name: Merge gate
    runs-on: ubuntu-latest
    needs: [preflight, supply-chain, backend, frontend, harness, ai-review]
    if: github.event_name == 'pull_request'
    steps:
      - name: Check approvals
        run: |
          if [ "${{ needs.preflight.outputs.requires_human }}" = "true" ]; then
            echo "::warning::PR de risco ${{ needs.preflight.outputs.risk_level }} — requer aprovação humana sénior"
            # Lógica real verificaria via GitHub API se há approving review
          fi
          echo "## ✓ Todos os gates passaram" >> $GITHUB_STEP_SUMMARY
          echo "Risk level: ${{ needs.preflight.outputs.risk_level }}" >> $GITHUB_STEP_SUMMARY
