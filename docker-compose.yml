# Sandbox isolado para o agente trabalhar.
# Nunca apontes o agente para a base de dados de produção.

services:
  app:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
    container_name: todo_app
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/vendor          # vendor não é montado, é construído na imagem
      - /var/www/node_modules
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: todo
      DB_USERNAME: todo
      DB_PASSWORD: secret
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: php artisan serve --host=0.0.0.0 --port=8000

  vite:
    image: node:24-alpine
    container_name: todo_vite
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/node_modules
    ports:
      - "5173:5173"
    command: sh -c "corepack enable && pnpm install && pnpm run dev -- --host"

  postgres:
    image: postgres:18-alpine
    container_name: todo_postgres
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: todo_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: